    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f4efe9;
            padding: 2rem 1.5rem;
        }
        .container {
            max-width: 1800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1rem;
            box-shadow: 0 10px 20px -10px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.6);
            transition: 0.2s;
            height: fit-content;
            position: relative;
        }
        .card:hover {
            transform: translateY(-3px);
        }
        .card-special {
            background: rgba(255, 235, 220, 0.8);
            border-left: 6px solid #f3a683;
        }
        .card-special .module-title {
            font-size: 0.9rem;
            color: #b25d3a;
        }
        .module-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #8b7a6a;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            border-bottom: 1px dashed #d2c2b2;
            padding-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .module-content {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #3e332b;
            word-break: break-word;
            white-space: pre-wrap;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .footer {
            grid-column: 1 / -1;
            text-align: center;
            color: #9a8575;
            font-size: 0.7rem;
            padding: 2rem 0 0.5rem;
            border-top: 1px dashed #d0c0b0;
            margin-top: 1rem;
        }
        .art-badge {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #fbd7c6, #f8c3aa);
            border-radius: 3rem;
            padding: 1.2rem 2rem;
            box-shadow: 0 10px 25px -8px rgba(0,0,0,0.2);
            font-family: 'Georgia', 'Times New Roman', serif;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.8);
            margin-bottom: 1rem;
        }
        .art-badge::before,
        .art-badge::after {
            content: "✨";
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            opacity: 0.6;
            color: #fff3e6;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .art-badge::before {
            left: 20px;
        }
        .art-badge::after {
            right: 20px;
        }
        .badge-date {
            font-size: 2rem;
            font-weight: 500;
            color: #5a3f2e;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
            line-height: 1.2;
        }
        .badge-sub {
            font-size: 1.1rem;
            color: #7b5f4b;
            letter-spacing: 1px;
            margin-top: 0.3rem;
            font-style: italic;
        }
        .loading-status {
            display: inline-block;
            background: rgba(255,255,255,0.3);
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            margin-left: 0.5rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        @media (max-width: 1400px) {
            .container {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        @media (max-width: 1100px) {
            .container {
                grid-template-columns: repeat(4, 1fr);
            }
            .art-badge::before,
            .art-badge::after {
                display: none;
            }
            .badge-date {
                font-size: 1.5rem;
            }
        }
        @media (max-width: 800px) {
            .container {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 600px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
            }
            body { padding: 1rem; }
        }
        @media (max-width: 400px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            }
            function getDailyIndex(max) {
                const todayKey = getTodayKey();
                let hash = 0;
                for (let i = 0; i < todayKey.length; i++) {
                    hash = ((hash << 5) - hash) + todayKey.charCodeAt(i);
                    hash |= 0;
                }

            // ---------- 歌曲鉴赏函数（升级版）----------
            async function getDailySongWithReview() {
                const today = getTodayKey();
                const cacheKey = `net_song_review_${today}`;
                const cached = localStorage.getItem(cacheKey);
                if (cached) {
                    try { return JSON.parse(cached); } catch (e) { localStorage.removeItem(cacheKey); }
                }

                const fallbackSong = {
                    name: "成都",
                    artist: "赵雷",
                    fullText: "成都 - 赵雷\n\n📖 创作背景：\n暂无详细背景资料"
                };

                try {
                    // 1. 获取用户IP所在地区
                    let region = '默认';
                    try {
                        const ctrl = new AbortController();
                        const tid = setTimeout(() => ctrl.abort(), 3000);
                        const ipRes = await fetch('https://ipapi.co/json/', { signal: ctrl.signal });
                        clearTimeout(tid);
                        const ipData = await ipRes.json();
                        const regionName = ipData.region || ipData.city || '';
                        for (let key in regionSongLib) {
                            if (regionName.includes(key) || key.includes(regionName)) {
                                region = key;
                                break;
                            }
                        }
                    } catch (e) {
                        // 备选IP API
                        try {
                            const ctrl = new AbortController();
                            const tid = setTimeout(() => ctrl.abort(), 3000);
                            const ipRes = await fetch('https://ipinfo.io/json', { signal: ctrl.signal });
                            clearTimeout(tid);
                            const ipData = await ipRes.json();
                            const regionName = ipData.region || ipData.city || '';
                            for (let key in regionSongLib) {
                                if (regionName.includes(key) || key.includes(regionName)) {
                                    region = key;
                                    break;
                                }
                            }
                        } catch (e2) {}
                    }

                    // 2. 随机选择一首歌曲
                    const regionSongs = regionSongLib[region] || regionSongLib['默认'];
                    const song = regionSongs[Math.floor(Math.random() * regionSongs.length)];

                    // 3. 从 GitHub 加载歌曲鉴赏数据
                    let review = { background: '暂无详细背景资料', impact: '', musicalFeatures: [], reviews: [], lyricHighlights: [] };
                    try {
                        const reviewsUrl = 'https://raw.githubusercontent.com/luqingji/lukiai/main/song_reviews.json';
                        const reviewsRes = await fetch(reviewsUrl);
                        const reviewsData = await reviewsRes.json();
                        const songKey = `${song.name} - ${song.artist}`;
                        review = reviewsData[songKey] || review;
                    } catch (e) {
                        console.warn('无法加载歌曲鉴赏数据，使用默认', e);
                    }

                    // 4. 构建显示文本
                    const displayText = `🎵 ${song.name} - ${song.artist}\n\n` +
                        `📖 创作背景：\n${review.background}\n\n` +
                        (review.musicalFeatures && review.musicalFeatures.length ? `🎼 音乐特征：\n${review.musicalFeatures.map(f => '• ' + f).join('\n')}\n\n` : '') +
                        (review.impact ? `🌟 重要影响：\n${review.impact}\n\n` : '') +
                        (review.reviews && review.reviews.length ? `💬 乐评金句：\n${review.reviews.map(r => '“' + r + '”').join('\n')}\n\n` : '') +
                        (review.lyricHighlights && review.lyricHighlights.length ? `📝 歌词金句：\n${review.lyricHighlights.map(l => '“' + l + '”').join('\n')}` : '');

                    const result = {
                        name: song.name,
                        artist: song.artist,
                        fullText: displayText,
                        review: review
                    };

                    localStorage.setItem(cacheKey, JSON.stringify(result));
                    return result;

                } catch (e) {
                    console.warn('歌曲鉴赏获取失败，使用默认', e);
                    localStorage.setItem(cacheKey, JSON.stringify(fallbackSong));
                    return fallbackSong;
                }
            }

                const dateStr = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日 ${weekdays[today.getDay()]}`;

                // 获取本地模块内容
                const localContents = modules.slice(8).map(m => {

                    const text = formatContent(m.key, raw);

                    "正在获取你的专属歌曲鉴赏...",
                    "为什么数学书总是很忧郁？因为它有太多问题了。",

                    "画蛇添足：比喻多此一举，反而坏事。",
                    "不听老人言，吃亏在眼前。"

                    text: netFallbackTexts[idx]

                // 合并渲染

                let html = `<div class="art-badge">
                    <div class="badge-date">📅 ${dateStr}</div>
                    <div class="badge-sub">每日宝箱 · 102模块 <span class="loading-status">后台获取歌曲鉴赏中</span></div>
                </div>`;
                allContents.forEach((m, index) => {
                    const specialClass = index < 8 ? ' card-special' : '';
                    html += `
                        <div class="card${specialClass}" id="card-${m.key}">
                            <div class="module-title">${m.title}</div>
                            <div class="module-content">${m.text}</div>
                        </div>
                    `;
                });
                html += `<div class="footer">✨ 每日更新 · 前8个模块正在从网络获取最新内容，稍后自动更新</div>`;

                    getDailyJoke,
                    getDailyHitokoto,
                    getDailyPoetry,
                    getDailyHotComment,

                    getDailyIdiom,
                    getDailyProverb
                ];

                        const card = document.getElementById(`card-${m.key}`);
                        if (card) {
                            const contentDiv = card.querySelector('.module-content');
                            if (contentDiv) {
                                contentDiv.textContent = formatContent(m.key, result);
                            }
                        }
                    }).catch(() => {});
                }
            }
